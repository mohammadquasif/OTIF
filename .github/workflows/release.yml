name: Build & Publish Desktop App Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            tauriArgs: --bundles nsis,msi
    runs-on: ${{ matrix.platform }}
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python Backend Sidecar
        run: |
          python -m venv backend\.venv
          backend\.venv\Scripts\python.exe -m pip install --upgrade pip
          backend\.venv\Scripts\python.exe -m pip install backend\. pyinstaller
          powershell -ExecutionPolicy Bypass -File scripts\build_backend_sidecar.ps1
          $binaryDir = "apps\desktop\src-tauri\binaries"
          $source = Join-Path $binaryDir "otif-backend.exe"
          if (-not (Test-Path -LiteralPath $source)) { throw "Expected Windows sidecar missing: $source" }
          Get-ChildItem -LiteralPath $binaryDir | Format-Table Name,Length

      - name: Install frontend UI dependencies
        run: |
          cd apps/desktop
          npm ci

      - name: Sync version with git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          Write-Output "Updating tauri.conf.json to version: $ver"
          $confPath = "apps\desktop\src-tauri\tauri.conf.json"
          $json = Get-Content $confPath -Raw | ConvertFrom-Json
          $json.version = $ver
          $json | ConvertTo-Json -Depth 20 | Set-Content $confPath -Encoding utf8

      - name: Fetch locked Rust dependencies
        run: |
          cd apps/desktop/src-tauri
          cargo fetch

      - name: Build and Publish Tauri Desktop App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri
          args: ${{ matrix.tauriArgs }}
          tagName: ${{ github.ref_name }}
          releaseName: 'OTIF ${{ github.ref_name }} Windows Desktop Release'
          releaseBody: 'Automated Windows standalone desktop installers (.exe/.msi). macOS and Linux packaging will be enabled later.'
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
