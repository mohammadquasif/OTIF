name: Build & Publish Desktop App Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python Backend Sidecar (Windows)
        run: |
          python -m venv backend\.venv
          backend\.venv\Scripts\python.exe -m pip install --upgrade pip
          backend\.venv\Scripts\python.exe -m pip install backend\. pyinstaller
          powershell -ExecutionPolicy Bypass -File scripts\build_backend_sidecar.ps1
          Copy-Item "apps\desktop\src-tauri\binaries\otif-backend.exe" -Destination "apps\desktop\src-tauri\binaries\otif-backend-x86_64-pc-windows-msvc.exe" -Force

      - name: Install frontend UI dependencies
        run: |
          cd apps/desktop
          npm install

      - name: Build and Publish Tauri Desktop App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run desktop:build
          tagName: ${{ github.ref_name }}
          releaseName: 'OTIF ${{ github.ref_name }} Windows Desktop Release'
          releaseBody: 'Automated standalone Windows installer (.exe) release.'
          releaseDraft: false
          prerelease: false
