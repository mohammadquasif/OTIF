name: Build & Publish Desktop App Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ubuntu Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Python Backend Sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          python -m venv backend\.venv
          backend\.venv\Scripts\python.exe -m pip install --upgrade pip
          backend\.venv\Scripts\python.exe -m pip install -r backend\requirements.txt pyinstaller
          powershell -ExecutionPolicy Bypass -File scripts\build_backend_sidecar.ps1

      - name: Build Python Backend Sidecar (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip
          backend/.venv/bin/python -m pip install -r backend/requirements.txt pyinstaller
          mkdir -p apps/desktop/src-tauri/binaries
          backend/.venv/bin/python -m PyInstaller --clean --onefile --name otif-backend --paths backend backend/app/desktop_server.py
          cp backend/dist/otif-backend apps/desktop/src-tauri/binaries/otif-backend

      - name: Install frontend UI dependencies
        run: |
          cd apps/desktop
          npm install

      - name: Build and Publish Tauri Desktop App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'OTIF ${{ github.ref_name }} Desktop Release'
          releaseBody: 'Automated standalone installer release for Windows (.exe), macOS (.dmg), and Linux (.AppImage).'
          releaseDraft: false
          prerelease: false
